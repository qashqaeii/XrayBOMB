name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0.0

      - name: Build executable and ZIP
        run: python scripts/build_release.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: XrayConfigAnalyzerPro-Windows-x64
          path: release/XrayConfigAnalyzerPro-Windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/XrayConfigAnalyzerPro-Windows-x64.zip
          generate_release_notes: true
